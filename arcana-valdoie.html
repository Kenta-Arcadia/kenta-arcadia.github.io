<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KENTA Arcana — Valdoie</title>
  <meta name="description" content="Portail vers le parcours Arcana complet sur HAL — garage, village, révélation.">
  <meta name="theme-color" content="#050505">
  <meta name="color-scheme" content="dark">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --noir: #050505;
      --or: #c9a84c;
      --or-vif: #e8c96d;
      --or-pale: #f0dfa3;
      --creme: #e8dcc4;
      --bronze: #8b7355;
      --bronze-discret: rgba(139, 115, 85, 0.72);
      --trait-or: rgba(201, 168, 76, 0.22);
      --trait-marron: rgba(139, 115, 85, 0.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      background-color: var(--noir);
      color: var(--creme);
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1.65;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(0deg, transparent 0, transparent 5px, rgba(201, 168, 76, 0.04) 5px, rgba(201, 168, 76, 0.04) 6px),
        repeating-linear-gradient(90.6deg, transparent 0, transparent 6px, rgba(139, 115, 85, 0.035) 6px, rgba(139, 115, 85, 0.035) 7px);
      mix-blend-mode: soft-light;
      opacity: 0.55;
    }
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 1.25rem 1.25rem 3rem;
    }
    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--trait-marron);
    }
    .nav a {
      font-family: "Cinzel", Georgia, serif;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--or);
      text-decoration: none;
    }
    .nav a:hover { color: var(--or-pale); }

    .gate {
      text-align: center;
      padding: 2.5rem 1.25rem 3rem;
      border: 1px solid var(--trait-or);
      border-radius: 4px;
      background: linear-gradient(180deg, rgba(201, 168, 76, 0.05) 0%, transparent 42%);
    }
    .gate h1 {
      font-family: "Cinzel", Georgia, serif;
      font-weight: 600;
      font-size: clamp(1.35rem, 4vw, 1.85rem);
      letter-spacing: 0.08em;
      color: var(--or-pale);
      margin-bottom: 0.75rem;
    }
    .gate .lead {
      font-size: 0.92rem;
      color: var(--bronze-discret);
      margin-bottom: 2rem;
      max-width: 28rem;
      margin-left: auto;
      margin-right: auto;
    }

    #open-valdoie {
      font-family: "Cinzel", Georgia, serif;
      font-weight: 600;
      font-size: clamp(0.95rem, 2.5vw, 1.05rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 1rem 2rem;
      cursor: pointer;
      color: var(--or-vif);
      background: rgba(201, 168, 76, 0.12);
      border: 1px solid rgba(201, 168, 76, 0.42);
      border-radius: 4px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    #open-valdoie:hover {
      color: var(--or-pale);
      border-color: rgba(201, 168, 76, 0.58);
      background: rgba(201, 168, 76, 0.18);
    }
    #open-valdoie:focus-visible {
      outline: 2px solid var(--or);
      outline-offset: 4px;
    }

    .valdoie-sub {
      margin-top: 1.25rem;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      color: var(--bronze-discret);
    }

    #valdoie-error {
      font-family: "Cinzel", Georgia, serif;
      font-size: 1rem;
      letter-spacing: 0.06em;
      color: var(--bronze);
      text-align: center;
      padding: 3rem 1rem;
    }
    #valdoie-error:not([hidden]) {
      display: block;
    }
    #valdoie-ready[hidden],
    #valdoie-error[hidden] {
      display: none;
    }
  </style>
</head>
<body data-config-base="">
  <main class="wrap">
    <nav class="nav">
      <a href="arcana.html">Arcana</a>
      <a href="config.json">config.json</a>
    </nav>

    <div id="valdoie-error" role="alert" hidden>KENTA est en veille.</div>

    <div id="valdoie-ready" class="gate" hidden>
      <h1>Valdoie</h1>
      <p class="lead">Portail vers l’expérience Arcana sur HAL — aucune simulation ici.</p>
      <button type="button" id="open-valdoie">Ouvrir le parcours Valdoie complet</button>
      <p class="valdoie-sub">L’expérience complète — garage, village, révélation.</p>
    </div>
  </main>

  <script>
(function () {
  "use strict";

  function resolveConfigUrls() {
    var override =
      document.body.getAttribute("data-config-base") ||
      document.documentElement.getAttribute("data-config-base") ||
      "";
    if (override) {
      var base = override.replace(/\/?$/, "/");
      return [base + "config.json"];
    }
    var origin = window.location.origin;
    var href = window.location.href;
    var candidates = [
      new URL("config.json", href).href,
      origin + "/config.json",
      origin + "/pages/config.json"
    ];
    return candidates.filter(function (u, i, arr) {
      return arr.indexOf(u) === i;
    });
  }

  function loadArcanaBase() {
    var urls = resolveConfigUrls();
    function tryNext(i) {
      if (i >= urls.length) return Promise.resolve(null);
      return fetch(urls[i], { cache: "no-store" })
        .then(function (res) {
          if (!res.ok) return tryNext(i + 1);
          return res.json().then(function (cfg) {
            var u = cfg && cfg.arcana_url;
            if (typeof u === "string" && u.trim()) return u.replace(/\/?$/, "");
            return tryNext(i + 1);
          });
        })
        .catch(function () {
          return tryNext(i + 1);
        });
    }
    return tryNext(0);
  }

  var errEl = document.getElementById("valdoie-error");
  var readyEl = document.getElementById("valdoie-ready");
  var btn = document.getElementById("open-valdoie");

  loadArcanaBase().then(function (base) {
    if (!base) {
      if (errEl) errEl.hidden = false;
      return;
    }
    if (readyEl) readyEl.hidden = false;
    if (btn) {
      btn.addEventListener("click", function () {
        window.open(base + "/arcana", "_blank", "noopener,noreferrer");
      });
    }
  });
})();
  </script>
</body>
</html>
